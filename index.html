        status: 'pending', score: null, risk: null, ligacao: r.ligacao||'', 
        pedido: r.pedido||'', operador: r.operador||'', callAttempted: !!r.ligacao, 
        callAnswered: r.ligacao==='Atendeu', wpConfirmed: r.logOk==='OK', 
        orderConfirmed: false, addrConfirmed: true, prodConfirmed: true, attempts: r.ligacao?1:0 
      }
    }))
  };

  function money(c){return 'R$ '+(c/100).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
  function scoreCalc(v){let s=0;if(v.callAttempted)s+=10;if(v.callAnswered)s+=25;if(v.wpConfirmed)s+=20;if(v.orderConfirmed)s+=20;if(v.addrConfirmed)s+=15;if(v.prodConfirmed)s+=10;return Math.min(s,100);}
  function riskCalc(s){return s>=70?'low':s>=40?'medium':'high';}
  function valBadge(s){const m={approved:'bok',rejected:'ber',pending:'bwa',paid:'bok'};const l={approved:'aprovado',rejected:'rejeitado',pending:'pendente',paid:'pago'};return `<span class="badge ${m[s]||'bne'}">${l[s]||s}</span>`;}
  function riskBadge(r){const m={low:'bok',medium:'bwa',high:'ber'};const l={low:'baixo',medium:'médio',high:'alto'};return r?`<span class="badge ${m[r]}">${l[r]}</span>`:'<span class="td">—</span>';}
  function ligBadge(l){if(l==='Atendeu')return `<span class="badge bok">${l}</span>`;if(l==='Não Atendeu')return `<span class="badge ber">${l}</span>`;return l?`<span class="badge bne">${l}</span>`:'<span class="td">—</span>';}
  function pedidoBadge(p){const m={'LIBERADO ENVIO':'bok','AG-DATA-ENVIO':'bte','AGUARD-CONFIRMAR':'bwa','BOLETO ENVIADO':'bac','ENVIAR BOLETO':'bpu'};return p&&p!=='----'&&p?`<span class="badge ${m[p]||'bne'}">${p}</span>`:'<span class="td">—</span>';}
  function logBadge(ok){return ok==='OK'?`<span class="badge bok">✓ OK</span>`:ok==='PRIMEIRO-CONTATO'?`<span class="badge bwa">1º contato</span>`:`<span class="badge bne">${ok||'—'}</span>`;}

  // 4. LOGICA DE INTERFACE
  let curPage='dashboard', flashT=null;
  function showF(msg,t='ok'){
    const c=document.getElementById('content');if(!c)return;const o=c.querySelector('.flash');if(o)o.remove();
    const d=document.createElement('div');d.className=`flash f${t}`; d.innerHTML=`<span>${t==='ok'?'✓':t==='er'?'✕':'⚠'}</span> ${msg}`;
    c.insertBefore(d,c.firstChild);if(flashT)clearTimeout(flashT);flashT=setTimeout(()=>d.remove(),5000);
  }
  function openMod(title,body,foot){
    document.getElementById('mtitle').textContent=title; document.getElementById('mbody').innerHTML=body;
    document.getElementById('mfoot').innerHTML=foot||`<button class="btn btg bts" onclick="closeMod()">Fechar</button>`;
    document.getElementById('mbg').classList.add('open');
  }
  function closeMod(){document.getElementById('mbg').classList.remove('open');}
  function updateVB(){const n=ST.leads.filter(l=>l.val.status==='pending').length;const b=document.getElementById('vbadge');if(b){b.textContent=n;b.style.display=n?'':'none';}}

  function nav(p){
    curPage=p;
    document.querySelectorAll('.ni').forEach(i=>i.classList.toggle('on',i.dataset.p===p));
    const T={dashboard:'Dashboard',leads:'Leads',vendas:'Vendas',validacao:'Validação',expedicao:'Expedição',rastreio:'Rastreio',cobranca:'Cobrança',planilha:'Planilha Import',logs:'Logs de Auditoria'};
    document.getElementById('ptitle').textContent=T[p]||p;
    updateVB();
    const P={dashboard:pgDash,leads:pgLeads,vendas:pgVendas,validacao:pgVal,expedicao:pgExp,rastreio:pgRast,cobranca:pgCob,planilha:pgPlanilha,logs:pgLogs};
    const c=document.getElementById('content'); if(c) c.innerHTML='';
    if(P[p])P[p](c);
  }

  // 5. FIREBASE INTEGRATION
  async function loadFirebaseData() {
    try {
      const snap = await getDocs(collection(db, "leads_val"));
      snap.forEach(doc => {
        const lead = ST.leads.find(l => l.id == doc.id);
        if (lead) lead.val = { ...lead.val, ...doc.data() };
      });
      nav('dashboard');
    } catch(e) { console.error("Firebase Error:", e); nav('dashboard'); }
  }

  window.saveVal = async function(id, status) {
    const l=ST.leads.find(x=>x.id==id); if(!l) return;
    const v = {
      callAttempted: !!document.getElementById('vc-call-att')?.checked,
      callAnswered: !!document.getElementById('vc-call-ans')?.checked,
      wpConfirmed: !!document.getElementById('vc-wp')?.checked,
      orderConfirmed: !!document.getElementById('vc-ord')?.checked,
      addrConfirmed: true, prodConfirmed: true
    };
    const sc = scoreCalc(v);
    const data = { ...v, status, score: sc, risk: riskCalc(sc), operador: document.getElementById('vc-op').value, updatedAt: new Date().toISOString() };
    try {
      await setDoc(doc(db, "leads_val", id.toString()), data, { merge: true });
      l.val = { ...l.val, ...data };
      closeMod(); nav(curPage); showF("Dados Sincronizados!", "ok");
    } catch(e) { showF("Erro Firebase", "er"); }
  };

  // 6. RENDERIZADORES DE PAGINA
  function pgDash(c){
    const L=ST.leads; const ap=L.filter(l=>l.val.status==='approved').length; const pe=L.filter(l=>l.val.status==='pending').length;
    c.innerHTML = `
      <div class="kg" style="grid-template-columns:repeat(4,1fr)">
        <div class="kc"><div class="kl">Total Leads</div><div class="kv">${L.length}</div></div>
        <div class="kc"><div class="kl">Pendentes</div><div class="kv" style="color:var(--wa)">${pe}</div></div>
        <div class="kc"><div class="kl">Aprovados</div><div class="kv" style="color:var(--ok)">${ap}</div></div>
        <div class="kc"><div class="kl">Firebase</div><div class="kv" style="color:var(--acc)">ONLINE</div></div>
      </div>
      <div class="p2">
        <div class="card"><div class="ch"><span class="ct2">Distribuição UF</span></div><div style="padding:10px">${Object.entries(L.reduce((a,l)=>{a[l.estado]=(a[l.estado]||0)+1;return a;},{})).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([u,n])=>`<div style="display:flex;gap:8px;margin-bottom:5px"><span style="width:25px">${u}</span><div class="pr" style="flex:1"><div class="pf" style="width:${(n/L.length)*100}%;background:var(--acc)"></div></div></div>`).join('')}</div></div>
        <div class="card"><div class="ch"><span class="ct2">Ações</span></div><div class="cb"><button class="btn btp" style="width:100%" onclick="nav('validacao')">Abrir Validação →</button></div></div>
      </div>`;
  }

  function pgLeads(c){
    c.innerHTML = `<div class="card"><div class="scroll-x"><table><thead><tr><th>#</th><th>Nome</th><th>Tel</th><th>Status</th><th>Ação</th></tr></thead><tbody>${ST.leads.map(l=>`<tr><td class="tm">${l.id}</td><td>${l.nome}</td><td class="tm">${l.tel}</td><td>${valBadge(l.val.status)}</td><td><button class="btn btg bts" onclick="openLead(${l.id})">Ver</button></td></tr>`).join('')}</tbody></table></div></div>`;
  }

  function pgVal(c){
    c.innerHTML = `<div class="card"><div class="scroll-x"><table><thead><tr><th>#</th><th>Cliente</th><th>Score</th><th>Status</th><th style="text-align:right">Ação</th></tr></thead><tbody>${ST.leads.map(l=>`<tr><td class="tm">${l.id}</td><td>${l.nome}</td><td class="tm">${l.val.score||'0'}/100</td><td>${valBadge(l.val.status)}</td><td style="text-align:right"><button class="btn btp bts" onclick="openValForm(${l.id})">Validar</button></td></tr>`).join('')}</tbody></table></div></div>`;
  }

  // 7. EXPOSIÇÃO GLOBAL
  window.nav = nav; window.closeMod = closeMod; window.showF = showF;
  window.openValForm = (id) => {
    const l=ST.leads.find(x=>x.id==id); const v=l.val;
    const body = `
      <div style="display:grid;grid-template-columns:1fr 180px;gap:15px">
        <div>
          <label class="chkr"><input type="checkbox" id="vc-call-att" ${v.callAttempted?'checked':''}> Ligação Tentada</label>
          <label class="chkr"><input type="checkbox" id="vc-call-ans" ${v.callAnswered?'checked':''}> Ligação Atendida</label>
          <label class="chkr"><input type="checkbox" id="vc-wp" ${v.wpConfirmed?'checked':''}> WhatsApp OK</label>
          <label class="chkr"><input type="checkbox" id="vc-ord" ${v.orderConfirmed?'checked':''}> Pedido Confirmado</label>
          <div class="fg" style="margin-top:10px"><label class="fl">Operador</label><input class="fc" id="vc-op" value="João Silva"></div>
        </div>
        <div class="card" style="text-align:center;padding:10px"><div class="kl">Score</div><div class="sco" style="border-color:var(--acc);margin:10px auto"><div class="kv">${v.score||'0'}</div></div></div>
      </div>`;
    const foot = `<button class="btn btg bts" onclick="closeMod()">Sair</button><button class="btn btp bts" onclick="saveVal(${id},'approved')">Aprovar e Salvar</button>`;
    openMod(`Validar: ${l.nome}`, body, foot);
  };

  window.openLead = (id) => {
    const l=ST.leads.find(x=>x.id==id);
    openMod(l.nome, `<div class="info-row"><span class="info-k">Telefone</span><span class="info-v">${l.tel}</span></div><div class="info-row"><span class="info-k">Endereco</span><span class="info-v" style="font-size:10px">${l.planilha.endereco}</span></div>`, null);
  };

  // Funções Extras
  window.pgVendas = (c) => { c.innerHTML = '<p style="padding:20px;color:var(--t2)">Página de Vendas.</p>'; };
  window.pgExp = (c) => { c.innerHTML = '<p style="padding:20px;color:var(--t2)">Página de Expedição.</p>'; };
  window.pgRast = (c) => { c.innerHTML = '<p style="padding:20px;color:var(--t2)">Página de Rastreio.</p>'; };
  window.pgCob = (c) => { c.innerHTML = '<p style="padding:20px;color:var(--t2)">Página de Cobrança.</p>'; };
  window.pgPlanilha = (c) => { c.innerHTML = '<p style="padding:20px;color:var(--t2)">Visualização da Planilha.</p>'; };
  window.pgLogs = (c) => { c.innerHTML = '<p style="padding:20px;color:var(--t2)">Logs Firestore Ativos.</p>'; };

  // 8. INICIALIZAÇÃO
  loadFirebaseData();
  document.querySelectorAll('.ni').forEach(i=>i.addEventListener('click',()=>nav(i.dataset.p)));
</script>
