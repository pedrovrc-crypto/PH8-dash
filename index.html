const ST = {

    id: r.seq,

    dig5: r.dig5,
    src: r.src,

    planilha: r,
    val: {
      status: r.pedido==='LIBERADO ENVIO'?'approved': r.logOk==='PRIMEIRO-CONTATO'&&!r.ligacao?'pending':'pending',
      score: null, risk: null,
      ligacao: r.ligacao||'',
      pedido: r.pedido||'',
      operador: r.operador||'',
      callAttempted: r.ligacao==='Atendeu'||r.ligacao==='Não Atendeu',
      callAnswered: r.ligacao==='Atendeu',
      wpConfirmed: r.logOk==='OK',
      orderConfirmed: r.pedido==='LIBERADO ENVIO'||r.pedido==='AG-DATA-ENVIO',
      addrConfirmed: !!r.endereco,
      prodConfirmed: !!r.produto,
      statusVend: r.statusVend,

      logCod: r.logCod,

    }

};

function money(c){return 'R$ '+(c/100).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function score(v){let s=0;if(v.callAttempted)s+=10;if(v.callAnswered)s+=25;if(v.wpConfirmed)s+=20;if(v.orderConfirmed)s+=20;if(v.addrConfirmed)s+=15;if(v.prodConfirmed)s+=10;return Math.min(s,100);}
function risk(s){return s>=70?'low':s>=40?'medium':'high';}
function valBadge(s){const m={approved:'bok',rejected:'ber',pending:'bwa'};const l={approved:'aprovado',rejected:'rejeitado',pending:'pendente'};return `<span class="badge ${m[s]||'bne'}">${l[s]||s}</span>`;}
function riskBadge(r){const m={low:'bok',medium:'bwa',high:'ber'};const l={low:'baixo',medium:'médio',high:'alto'};return r?`<span class="badge ${m[r]}">${l[r]}</span>`:'<span class="td">—</span>';}
function ligBadge(l){if(l==='Atendeu')return `<span class="badge bok">${l}</span>`;if(l==='Não Atendeu')return `<span class="badge ber">${l}</span>`;if(l)return `<span class="badge bne">${l}</span>`;return '<span class="td">—</span>';}
function pedidoBadge(p){const m={'LIBERADO ENVIO':'bok','AG-DATA-ENVIO':'bte','AGUARD-CONFIRMAR':'bwa','BOLETO ENVIADO':'bac','ENVIAR BOLETO':'bpu','----':'bne','':`bne`};const cls=m[p]||'bne';return p&&p!='----'&&p?`<span class="badge ${cls}">${p}</span>`:'<span class="td">—</span>';}
function logBadge(ok){if(ok==='OK')return `<span class="badge bok">✓ OK</span>`;if(ok==='PRIMEIRO-CONTATO')return `<span class="badge bwa">1º contato</span>`;return `<span class="badge bne">${ok||'—'}</span>`;}

// ── FORMULÁRIO DE VALIDAÇÃO COMPLETO ─────────────────────────
window.openValForm=function(id){
  const l=ST.leads.find(x=>x.id===id);if(!l)return;

  const scoreColor=(s)=>s>=70?'var(--ok)':s>=40?'var(--wa)':'var(--er)';

  function chkRow(checked,name,label,desc,color='var(--acc)'){

          <div><div class="kl">${k}</div><div style="font-size:11px;color:${col||'var(--t1)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${v2}">${v2||'—'}</div></div>`).join('')}
        </div>
        ${p.obs?`<div style="background:var(--bg);border:1px solid var(--b1);border-radius:var(--r);padding:6px 8px;font-size:10px;color:var(--wa);margin-top:8px">⚠ Obs: ${p.obs}</div>`:''}
      </div>
    </div>

    <!-- Dados da planilha: logística e status -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px">
      <div class="card">
        <div class="ch"><span class="ct2">Logística (planilha)</span></div>
        <div class="cb">
          ${[['Código logística',p.logCod],['Status logística',p.logOk],['Status Braip',p.statusBraip],['Status vendedor',p.statusVend],['Data prevista',p.dataPrev||'—'],['Rastreio',p.rastreio||'—']].map(([k,v2])=>`
          <div class="info-row"><span class="info-k">${k}</span><span class="info-v" style="font-size:10px">${v2||'—'}</span></div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="ch"><span class="ct2">Histórico de contato</span></div>
        <div class="cb">
          ${[['Ligação (planilha)',p.ligacao||'—'],['Status pedido',p.pedido||'—'],['Operador',p.operador||'—']].map(([k,v2])=>`
          <div class="info-row"><span class="info-k">${k}</span><span class="info-v">${v2}</span></div>`).join('')}
          <div style="margin-top:8px">
            <div class="fl">Atualizar ligação</div>
            <select class="fc" id="vc-ligacao" ${dis} style="font-size:11px">
              <option value="" ${!v.ligacao?'selected':''}>— não registrado —</option>

              <option value="Não Atendeu" ${v.ligacao==='Não Atendeu'?'selected':''}>Não Atendeu</option>

        ${chkRow(v.addrConfirmed,'addr','Endereço confirmado','Endereço de entrega validado com o cliente','var(--ok)')}
        ${chkRow(v.prodConfirmed,'prod','Produto confirmado','Cliente sabe o produto e quantidade','var(--ok)')}
      </div>
    </div>

    <!-- Decisão -->
    <div class="card" style="margin-bottom:9px">
      <div class="ch"><span class="ct2">3. Score, risco e decisão</span><button type="button" class="btn btg bts" id="autoscbtn" ${isD?'disabled':''}>↻ Recalcular</button></div>
      <div class="cb" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px">
        <div class="fg" style="margin:0">
          <label class="fl">Score (0–100)</label>
          <input type="number" class="fc" id="vc-score" min="0" max="100" value="${sc}" ${dis}>
          <div class="fh">Calculado pelos critérios</div>
        </div>
        <div class="fg" style="margin:0">
          <label class="fl">Nível de risco</label>
          <select class="fc" id="vc-risk" ${dis}>
            <option value="low" ${ri==='low'?'selected':''}>Baixo (≥70)</option>
            <option value="medium" ${ri==='medium'?'selected':''}>Médio (40–69)</option>
            <option value="high" ${ri==='high'?'selected':''}>Alto (&lt;40)</option>
          </select>
        </div>
        <div class="fg" style="margin:0">
          <label class="fl">Decisão</label>
          <select class="fc" id="vc-status" ${isD?'disabled':''}>
            <option value="pending" ${v.status==='pending'||!v.status?'selected':''}>Pendente</option>
            <option value="approved" ${v.status==='approved'?'selected':''}>Aprovar → Expedição</option>
            <option value="rejected" ${v.status==='rejected'?'selected':''}>Rejeitar → Cancelar</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:9px">
        <div class="fg" style="margin:0">
          <label class="fl">Motivo / justificativa</label>
          <input type="text" class="fc" id="vc-reason" value="${v.reason||p.obs||''}" placeholder="Ex: cliente confirmado, endereço ok" ${dis}>
        </div>
        <div class="fg" style="margin:0">
          <label class="fl">Tentativas de contato</label>
          <input type="number" class="fc" id="vc-attempts" value="${v.attempts||0}" min="0" max="99" ${dis}>
        </div>
      </div>
    </div>

    <!-- Operacional -->
    <div class="card" style="margin-bottom:9px">
      <div class="ch"><span class="ct2">4. Operacional</span></div>
      <div class="cb" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px">
        <div class="fg" style="margin:0">
          <label class="fl">Operador (planilha)</label>
          <input class="fc" value="${p.operador||'—'}" disabled>
        </div>
        <div class="fg" style="margin:0">
          <label class="fl">Operador atual</label>
          <input class="fc" id="vc-op" value="${v.operador||'João Silva'}" ${dis}>
        </div>
        <div class="fg" style="margin:0">
          <label class="fl">Data prevista</label>
          <input class="fc" value="${p.dataPrev||'—'}" disabled>
          <div class="fh">Conforme planilha</div>
        </div>
      </div>
    </div>

    <!-- Observações -->
    <div class="card">
      <div class="ch"><span class="ct2">5. Observações</span></div>
      <div class="cb">
        ${p.obs?`<div style="background:var(--bg);border:1px solid var(--b1);border-radius:var(--r);padding:6px 8px;font-size:10px;color:var(--wa);margin-bottom:7px">Planilha: "${p.obs}"</div>`:''}
        <textarea class="fc" id="vc-notes" rows="2" style="resize:none" ${dis}>${v.notes||''}</textarea>
      </div>
    </div>
    ${isD?`<div style="background:rgba(243,156,18,.08);border:1px solid rgba(243,156,18,.3);border-radius:var(--r);padding:8px;font-size:11px;color:var(--wa);margin-top:9px">⚠ Decisão já registrada. Apenas admin pode reverter.</div>`:''}
  </div>

  <!-- Painel lateral -->
  <div style="display:flex;flex-direction:column;gap:9px">
    <div class="card">
      <div class="ch"><span class="ct2">Score</span></div>
      <div class="cb" style="text-align:center;padding:12px">
        <div class="sco" id="sc-circle" style="border-color:${scoreColor(sc)}">
          <div style="font-family:var(--mono);font-size:24px;font-weight:500;color:${scoreColor(sc)}" id="sc-num">${sc}</div>
          <div style="font-size:9px;color:var(--t3)">/100</div>
        </div>
        <div style="margin-top:8px" id="sc-risk">${riskBadge(ri)}</div>
        ${!isD?`<button class="btn btg bts" style="margin-top:8px;width:100%" id="autoscbtn2">↻ Auto</button>`:''}
      </div>
    </div>
    <div class="card">
      <div class="ch"><span class="ct2">Progresso</span></div>
      <div class="cb" style="padding:8px">
        ${[['Lig. tentada',v.callAttempted,'call-att'],['Lig. atendida',v.callAnswered,'call-ans'],['WhatsApp/Log OK',v.wpConfirmed,'wp'],['Pedido conf.',v.orderConfirmed,'ord'],['Endereço conf.',v.addrConfirmed,'addr'],['Produto conf.',v.prodConfirmed,'prod']].map(([l,val,n])=>`
        <div class="info-row" id="prog-${n}">
          <span style="font-size:11px;color:${val?'var(--t1)':'var(--t3)'}">${val?'✓':'○'} ${l}</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="ch"><span class="ct2">Dados logística</span></div>
      <div class="cb" style="padding:8px">
        ${[['Cód. logística',p.logCod],['Status logística',logBadge(p.logOk)],['Ligação',ligBadge(p.ligacao)],['Pedido',pedidoBadge(p.pedido)]].map(([k,v2])=>`
        <div class="info-row"><span class="info-k" style="font-size:10px">${k}</span><span style="font-size:10px">${v2}</span></div>`).join('')}
      </div>
    </div>
  </div>
  </div>`;

  const foot=isD
    ?`<button class="btn btg bts" onclick="closeMod()">← Fechar</button>`
    :`<button class="btn btg bts" onclick="closeMod()">Cancelar</button>
      <button class="btn btg bts" onclick="saveVal(${id},'pending')">Salvar rascunho</button>
      <button class="btn bte2 bts" onclick="if(confirm('Rejeitar e cancelar este pedido?'))saveVal(${id},'rejected')">✕ Rejeitar</button>
      <button class="btn bto bts" onclick="saveVal(${id},'approved')">✓ Aprovar → Expedição</button>`;

  openMod(`Validação — ${p.key} · ${l.nome.split(' ')[0]} ${l.nome.split(' ').slice(-1)}`,body,foot);

  if(!isD){
    const names=['call-att','call-ans','wp','ord','addr','prod'];
    function recalc(){
      const fv={callAttempted:!!document.getElementById('vc-call-att')?.checked,callAnswered:!!document.getElementById('vc-call-ans')?.checked,whatsappConfirmed:!!document.getElementById('vc-wp')?.checked,customerConfirmedOrder:!!document.getElementById('vc-ord')?.checked,confirmedAddress:!!document.getElementById('vc-addr')?.checked,confirmedProduct:!!document.getElementById('vc-prod')?.checked};
      const s=score({callAttempted:fv.callAttempted,callAnswered:fv.callAnswered,wpConfirmed:fv.whatsappConfirmed,orderConfirmed:fv.customerConfirmedOrder,addrConfirmed:fv.confirmedAddress,prodConfirmed:fv.confirmedProduct});
      const r=risk(s);
      const col=scoreColor(s);
      const sn=document.getElementById('sc-num');const sc2=document.getElementById('sc-circle');
      if(sn){sn.textContent=s;sn.style.color=col;if(sc2)sc2.style.borderColor=col;}
      const srisk=document.getElementById('sc-risk');
      if(srisk)srisk.innerHTML=riskBadge(r);
      const si=document.getElementById('vc-score');if(si)si.value=s;
      const ri2=document.getElementById('vc-risk');if(ri2)ri2.value=r;
      names.forEach(n=>{
        const el=document.getElementById('vc-'+n);const pd=document.getElementById('prog-'+n);
        if(pd){const checked=el?el.checked:false;pd.innerHTML=`<span style="font-size:11px;color:${checked?'var(--t1)':'var(--t3)'}">${checked?'✓':'○'} ${pd.querySelector('span').textContent.slice(2)}</span>`;}
      });
    }
    names.forEach(n=>{const el=document.getElementById('vc-'+n);if(el)el.addEventListener('change',recalc);});
    ['autoscbtn','autoscbtn2'].forEach(bid=>{const b=document.getElementById(bid);if(b)b.addEventListener('click',recalc);});
  }
};

window.saveVal=function(id,forcedStatus){
  const l=ST.leads.find(x=>x.id===id);if(!l)return;
  const callAtt=!!document.getElementById('vc-call-att')?.checked;
  const callAns=!!document.getElementById('vc-call-ans')?.checked;
  const wp=!!document.getElementById('vc-wp')?.checked;
  const ord=!!document.getElementById('vc-ord')?.checked;
  const addr=!!document.getElementById('vc-addr')?.checked;
  const prod=!!document.getElementById('vc-prod')?.checked;
  const sc=score({callAttempted:callAtt,callAnswered:callAns,wpConfirmed:wp,orderConfirmed:ord,addrConfirmed:addr,prodConfirmed:prod});
  const ri=risk(sc);
  const status=forcedStatus;
  const lig=document.getElementById('vc-ligacao')?.value||l.val.ligacao;
  const ped=document.getElementById('vc-pedido')?.value||l.val.pedido;
  const op=document.getElementById('vc-op')?.value||'João Silva';
  const reason=document.getElementById('vc-reason')?.value||'';
  const notes=document.getElementById('vc-notes')?.value||'';
  const attempts=parseInt(document.getElementById('vc-attempts')?.value)||0;

  l.val={...l.val,status,score:sc,risk:ri,callAttempted:callAtt,callAnswered:callAns,wpConfirmed:wp,orderConfirmed:ord,addrConfirmed:addr,prodConfirmed:prod,ligacao:lig,pedido:ped,operador:op,reason,notes,attempts};
  l.planilha.ligacao=lig;l.planilha.pedido=ped;l.planilha.operador=op;

  closeMod();
  nav('validacao');
  const msgs={approved:`✓ ${l.nome.split(' ')[0]} aprovado — score ${sc}/100 — enviado para expedição!`,rejected:`${l.nome.split(' ')[0]} rejeitado — pedido cancelado.`,pending:`Rascunho salvo — score ${sc}/100.`};
  showF(msgs[status],status==='approved'?'ok':status==='rejected'?'er':'wa');
};

window.markPago=function(id){const l=ST.leads.find(x=>x.id===id);if(!l)return;l.val.status='paid';nav('cobranca');showF(`Pago — ${l.nome.split(' ')[0]}`);};
window.markFrust=function(id){const l=ST.leads.find(x=>x.id===id);if(!l)return;l.val.status='rejected';nav('cobranca');showF(`Frustrado — ${l.nome.split(' ')[0]}`,'er');};

// ── LOGS ──────────────────────────────────────────────────────
function pgLogs(c){
  const logs=ST.leads.filter(l=>l.val.status!=='pending').map(l=>({
    time:l.data,user:l.val.operador||'Sistema',action:'validation_'+l.val.status,
    detail:`${l.planilha.key} — score ${l.val.score}/100`,
    ip:'177.x.x.x'
  }));
  c.innerHTML=`
  <div style="margin-bottom:10px;font-family:var(--mono);font-size:12px">Logs de Auditoria — ${logs.length} registros</div>
  <div class="card"><div class="scroll-x"><table>
    <thead><tr><th>Data</th><th>Usuário</th><th>Ação</th><th>Detalhe</th><th>IP</th></tr></thead>
    <tbody>
    ${logs.map(a=>{const cls={validation_approved:'bok',validation_rejected:'ber',validation_pending:'bwa'}[a.action]||'bne';return`<tr>
      <td class="tm">${a.time}</td>
      <td style="font-size:11px">${a.user}</td>
      <td><span class="badge ${cls}" style="font-size:9px">${a.action}</span></td>
      <td class="td">${a.detail}</td>
      <td class="tm" style="font-size:9px">${a.ip}</td>
    </tr>`;}).join('')}
    ${logs.length===0?`<tr><td colspan="5"><div style="padding:24px;text-align:center;color:var(--t3);font-size:12px">Nenhuma ação registrada ainda</div></td></tr>`:''}
    </tbody>
  </table></div></div>`;
}
